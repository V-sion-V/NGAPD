name: ngapd

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ngapd}
      POSTGRES_USER: ${POSTGRES_USER:-ngapd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: api
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ngapd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ngapd}
    command: ["node", "packages/database/dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-ngapd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ngapd}
      OBJECT_STORE_PATH: /var/lib/ngapd/objects
      BACKUP_PATH: /var/lib/ngapd/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - object-data:/var/lib/ngapd/objects
      - backup-data:/var/lib/ngapd/backups

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-ngapd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ngapd}
    depends_on:
      migrate:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: deploy/Caddy.Dockerfile
    restart: unless-stopped
    environment:
      NGAPD_SITE_ADDRESS: ${NGAPD_SITE_ADDRESS:-https://ngapd.local}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  object-data:
  backup-data:
  caddy-data:
  caddy-config:
